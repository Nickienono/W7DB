<!DOCTYPE html>
<html lang="nl">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Washin7 Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1e293b;min-height:100vh}
button{border:none;cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;font-size:14px}
textarea{resize:none}

/* Layout */
#app{min-height:100vh;background:#f1f5f9;position:relative}
.header{position:sticky;top:0;z-index:100;background:#0e2f52;border-bottom:none;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25)}.header-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;}
.header-logo{display:flex;align-items:center;gap:8px}
.logo-badge{width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.header-title{display:none}
.header-right{display:flex;align-items:center;gap:12px}
.user-pill{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.85);font-size:13px;font-weight:500}
.btn-logout{background:none;color:rgba(255,255,255,0.6);padding:4px;border-radius:6px;display:flex}
.btn-logout:hover{color:#64748b}
main{padding:16px 20px 16px 20px;box-sizing:border-box;max-width:100%;overflow-x:hidden}


/* Login */
.login-screen{min-height:100vh;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-badge{width:72px;height:72px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.login-logo-badge span{font-size:26px;font-weight:900;color:#2563eb}
.login-logo h1{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px}
.login-logo p{color:rgba(255,255,255,.7);font-size:14px}
.login-label{font-size:13px;color:#64748b;font-weight:500;text-align:center;margin-bottom:14px}
.login-user-btn{width:100%;background:#eff6ff;border:2px solid #dbeafe;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;color:#1e40af;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all .15s}
.login-user-btn:hover{background:#dbeafe;border-color:#bfdbfe}
.login-user-btn:active{background:#bfdbfe}
.login-avatar{width:36px;height:36px;background:#2563eb;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.login-role{font-size:11px;color:#64748b;font-weight:500;margin-top:2px}
.divider{display:flex;align-items:center;gap:8px;margin:14px 0;color:#94a3b8;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.login-custom{display:flex;gap:8px}
.input{border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;color:#1e293b;background:#fff;width:100%;transition:border-color .15s}
.input:focus{border-color:#2563eb;outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-primary{background:#2563eb;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:active{background:#1e40af}

/* Cards */
.page{padding:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9}
.card+.card{margin-top:10px}

/* Dashboard */
.greeting-name{font-size:22px;font-weight:700;color:#1e293b}
.greeting-date{font-size:12px;color:#94a3b8;margin-top:2px}
.section-label{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 10px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.dash-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9;text-align:left;cursor:pointer;transition:transform .1s;width:100%}
.dash-card:active{transform:scale(.97)}
.dash-card-full{grid-column:1/-1}
.dash-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.dash-icon svg{width:18px;height:18px;color:#fff;stroke:#fff}
.dash-count{font-size:22px;font-weight:700;color:#1e293b;float:right;margin-top:-6px}
.dash-count.zero{color:#cbd5e1}
.dash-title{font-size:13px;font-weight:600;color:#1e293b;clear:both}
.dash-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.task-preview{background:#fff;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);margin-bottom:8px}
.dot{width:7px;height:7px;background:#3b82f6;border-radius:50%;flex-shrink:0}
.task-preview-text{font-size:13px;color:#374151;flex:1}
.more-link{font-size:13px;color:#3b82f6;font-weight:500;background:none;padding:4px 0}

/* Form */
.form-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid #eff6ff;margin-bottom:12px;animation:fadeIn .15s ease}
.form-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:10px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-actions{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;padding:9px;border-radius:10px;font-size:13px;color:#64748b;background:#f1f5f9;font-weight:500}
.btn-save{flex:1;padding:9px;border-radius:10px;font-size:13px;color:#fff;font-weight:600}
.btn-save.blue{background:#2563eb}
.btn-save.orange{background:#f97316}
.btn-save.purple{background:#9333ea}

/* Filter tabs */
.tabs{display:flex;gap:3px;background:#f1f5f9;padding:4px;border-radius:10px;margin-bottom:14px}
.tab{flex:1;padding:6px;border-radius:7px;font-size:12px;font-weight:600;color:#64748b;background:none;transition:all .15s}
.tab.active{background:#fff;color:#1e293b;box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* Item rows */
.item-row{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.item-row.dimmed{opacity:.55}
.check-btn{width:24px;height:24px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:none;transition:all .15s}
.check-btn.done{background:#22c55e;border-color:#22c55e}
.check-btn.bezig{background:#f59e0b;border-color:#f59e0b}
.check-btn.blue-ring{border-color:#93c5fd}
.check-btn.purple-ring{border-color:#d8b4fe}
.check-btn:hover.blue-ring{border-color:#2563eb}
.check-btn:hover.purple-ring{border-color:#9333ea}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;color:#1e293b}
.item-title.struck{text-decoration:line-through;color:#94a3b8}
.item-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.tag.blue{background:#eff6ff;color:#2563eb}
.tag.purple{background:#faf5ff;color:#9333ea}
.tag.orange{background:#fff7ed;color:#ea580c}
.meta-text{font-size:11px;color:#94a3b8}
.delete-btn{color:#cbd5e1;background:none;padding:4px;border-radius:6px;transition:color .15s;flex-shrink:0}
.delete-btn:hover{color:#ef4444}
.empty-state{text-align:center;padding:48px 0;color:#94a3b8}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;margin-top:4px;display:block}

/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.page-title{font-size:22px;font-weight:700;color:#1e293b}
.page-subtitle{font-size:11px;color:#94a3b8;margin-top:2px}
.fab{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .1s}
.fab:active{transform:scale(.93)}
.fab.blue{background:#2563eb}
.fab.orange{background:#f97316}
.fab.purple{background:#9333ea}

/* For/By labels */
.assign-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.assign-label{font-size:12px;color:#64748b;white-space:nowrap}
.assign-btns{display:flex;gap:6px;flex:1}
.assign-btn{flex:1;padding:6px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .15s}
.assign-btn.selected{background:#2563eb;color:#fff;border-color:#2563eb}

/* Collapsed section */
.collapse-btn{background:none;font-size:12px;color:#94a3b8;font-weight:500;padding:4px 0;display:flex;align-items:center;gap:4px}
.collapse-actions{display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px}
.del-done-btn{font-size:12px;color:#ef4444;font-weight:500;background:none}

/* Icons (inline SVG via JS) */
.cl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cl-naam{font-size:14px;font-weight:600;color:#1e293b}
.cl-progress{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:8px}
.cl-bar{height:100%;background:#16a34a;border-radius:3px;transition:width .3s}
.cl-meta{font-size:11px;color:#94a3b8;margin-top:5px}
.cl-back{background:none;color:#2563eb;font-size:13px;font-weight:600;padding:0 0 10px;display:flex;align-items:center;gap:4px;border:none;cursor:pointer}
.cl-item-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f8fafc}
.cl-item-row:last-child{border-bottom:none}
.cl-check{width:22px;height:22px;border-radius:6px;border:2px solid #86efac;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:none;transition:all .15s;cursor:pointer}
.cl-check.done{background:#16a34a;border-color:#16a34a}
.cl-item-tekst{font-size:14px;color:#1e293b;flex:1}
.cl-item-tekst.done{text-decoration:line-through;color:#94a3b8}
.fab.green{background:#16a34a}
.chat-feed{display:flex;flex-direction:column;gap:8px;padding-bottom:56px}
.chat-mine{align-self:flex-end;max-width:82%}
.chat-other{align-self:flex-start;max-width:82%}
.chat-bubble{padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45}
.chat-mine .chat-bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.chat-other .chat-bubble{background:#fff;color:#1e293b;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.chat-sender{font-size:10px;font-weight:600;color:#64748b;margin-bottom:2px}
.chat-mine .chat-sender{text-align:right}
.chat-ts{font-size:10px;color:#94a3b8;margin-top:2px}
.chat-mine .chat-ts{text-align:right}
.chat-bar{position:fixed;bottom:56px;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:8px 12px;z-index:99}
.chat-bar-inner{display:flex;gap:8px}
.chat-send-btn{background:#2563eb;color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer;border:none}

      .collapse-actions { display:flex; align-items:center; gap:10px; padding:8px 0 4px; }
      .collapse-btn { background:none; border:none; color:#64748b; font-size:13px; cursor:pointer; padding:4px 0; }
      .del-done-btn { background:none; border:none; color:#ef4444; font-size:12px; cursor:pointer; margin-left:auto; }
      .dimmed { opacity:0.55; }
      .struck { text-decoration:line-through; color:#94a3b8; }
      .check-btn.blue-ring { width:22px; height:22px; border-radius:50%; border:2px solid #3b82f6; background:none; cursor:pointer; flex-shrink:0; margin-top:2px; }
      .check-btn.done { width:22px; height:22px; border-radius:50%; border:2px solid #22c55e; background:#22c55e; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:11px; }
      
      .plan-progress { height:6px; background:#e2e8f0; border-radius:3px; margin:10px 0 16px; }
      .plan-bar { height:6px; background:#3b82f6; border-radius:3px; transition:width .3s; }
      .plan-cat-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
      .plan-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#fff; border-radius:10px; margin-bottom:5px; border:1px solid #e2e8f0; }
      .plan-item.plan-done { background:#f0fdf4; border-color:#bbf7d0; }
      .plan-naam { font-size:13px; color:#1e293b; flex:1; }
      .plan-item.plan-done .plan-naam { text-decoration:line-through; color:#94a3b8; }
      .week-done-badge { background:#22c55e; color:#fff; font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; align-self:center; }
      .dash-cards { display:flex; gap:10px; }
      .dash-card { flex:1; background:#fff; border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; border:1px solid #e2e8f0; }
      .dash-card.blue { border-top:3px solid #3b82f6; }
      .dash-card.green { border-top:3px solid #22c55e; }
      .dash-card.orange { border-top:3px solid #f59e0b; }
      .dash-num { font-size:24px; font-weight:700; color:#1e293b; }
      .dash-title { font-size:11px; color:#64748b; margin-top:2px; }
      
      .dash-layout { display:flex; gap:20px; align-items:flex-start; height:100%; }
      .dash-left { flex:1; min-width:0; display:flex; gap:14px; align-items:flex-start; }
      .dash-right { width:310px; flex-shrink:0; background:#fff; border-radius:16px; border:1px solid #e2e8f0; padding:14px; max-height:calc(100vh - 140px); overflow-y:auto; }
      .plan-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
      .plan-title { font-size:14px; font-weight:700; color:#1e293b; }
      .plan-sub { font-size:12px; color:#64748b; margin-top:1px; }

      @media (max-width:640px) { .dash-layout { flex-direction:column; } .dash-left { flex-direction:column; } .dash-right { width:100%; max-height:none; } }
      </style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

function renderLogin() {
  if (state.pinMode) { renderPinScreen(); return; }
  app.innerHTML = `
  <div class="login-screen">
    <div class="login-logo">
      <div class="login-logo-badge"><span>W7</span></div>
      <h1>Washin7</h1>
      <p>Bedrijfsmanager</p>
    </div>
    <div class="login-card">
      <p class="login-label">Wie ben jij?</p>
      <button class="login-user-btn" data-name="Nick">
        <div class="login-avatar">N</div> Nick
      </button>
      <button class="login-user-btn" data-name="Tom">
        <div class="login-avatar">T</div> Tom
      </button>
    </div>
  </div>`;
  app.querySelectorAll('[data-name]').forEach(btn =>
    btn.addEventListener('click', () => {
      state.pendingUser = btn.dataset.name;
      state.pinInput = '';
      state.pinMode = true;
      window._pinError = false;
      render();
    })
  );
}

function renderPinScreen() {
  var pins = {'Nick':'9138','Tom':'369'};
  var correct = pins[state.pendingUser];
  var maxLen = correct.length;
  var ini = state.pendingUser[0];
  var dots = Array.from({length:maxLen},(_,i)=>'<div style="width:16px;height:16px;border-radius:50%;background:'+(i<state.pinInput.length?'#2563eb':'#e2e8f0')+';transition:background .15s;display:inline-block"></div>').join('');
  app.innerHTML = `
  <div class="login-screen">
    <div class="login-logo">
      <div class="login-logo-badge"><span>W7</span></div>
      <h1>Washin7</h1>
      <p>Bedrijfsmanager</p>
    </div>
    <div class="login-card">
      <div style="text-align:center;margin-bottom:16px">
        <div class="login-avatar" style="width:52px;height:52px;font-size:20px;margin:0 auto 10px">${ini}</div>
        <p style="font-weight:700;font-size:16px;color:#1e293b">${state.pendingUser}</p>
      </div>
      <p class="login-label" style="margin-bottom:16px">Voer je pincode in</p>
      <div style="display:flex;gap:14px;justify-content:center;margin-bottom:10px">${dots}</div>
      <div style="color:#ef4444;font-size:13px;text-align:center;min-height:20px;margin-bottom:14px">${window._pinError?'Onjuiste pincode, probeer opnieuw':''}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
        ${[1,2,3,4,5,6,7,8,9].map(n=>'<button class="pin-key" data-key="'+n+'" style="background:#f1f5f9;border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:#1e293b;transition:background .1s">'+n+'</button>').join('')}
        <button class="pin-key" data-key="back" style="background:#f1f5f9;border-radius:12px;padding:16px;font-size:20px;color:#64748b;transition:background .1s">&#9003;</button>
        <button class="pin-key" data-key="0" style="background:#f1f5f9;border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:#1e293b;transition:background .1s">0</button>
        <div></div>
      </div>
      <button id="pin-back" style="width:100%;padding:11px;border-radius:10px;font-size:14px;color:#64748b;background:#f1f5f9;font-weight:500;border:none;cursor:pointer">&#8592; Terug</button>
    </div>
  </div>`;
  app.querySelectorAll('.pin-key').forEach(function(btn){
    btn.addEventListener('click', function(){
      window._pinError = false;
      var k = btn.dataset.key;
      if (k === 'back') {
        state.pinInput = state.pinInput.slice(0,-1);
        renderPinScreen();
      } else if (state.pinInput.length < maxLen) {
        state.pinInput += k;
        if (state.pinInput.length === maxLen) {
          if (state.pinInput === correct) {
            state.pinMode = false; state.pinInput = '';
            doLogin(state.pendingUser);
          } else {
            window._pinError = true; state.pinInput = '';
            renderPinScreen();
          }
        } else { renderPinScreen(); }
      }
    });
  });
  document.getElementById('pin-back').addEventListener('click', function(){
    state.pinMode = false; state.pendingUser = null; state.pinInput = ''; window._pinError = false; render();
  });
}

function doLogin(naam) {
  naam = naam.trim();
  if (!naam) return;
  state.user = naam;
  state.takenVoor = naam;
  S.set('user', naam);
  window._lastActivity = Date.now();
  render();
}

function renderApp() {
  const openTaken = state.taken.filter(t => !t.voltooid).length;
  const openBoodschappen = state.boodschappen.filter(b => !b.afgevinkt).length;
  const openAandachtspunten = state.aandachtspunten.filter(a => !a.afgevinkt).length;

  const badge = n => n > 0 ? `<span class="nav-badge">${n > 9 ? '9+' : n}</span>` : '';



  app.innerHTML = `
  <div class="header">
    <div class="header-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="7" fill="rgba(255,255,255,0.12)"/><text x="18" y="27" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" fill="#f07828">7</text></svg>
    </div>
    <div class="header-center">
      <svg viewBox="0 0 220 44" height="40" xmlns="http://www.w3.org/2000/svg"><text x="2" y="38" font-family="Arial Black,sans-serif" font-weight="900" font-size="38" fill="#f07828" letter-spacing="-1">WASHIN</text><circle cx="200" cy="22" r="20" fill="rgba(255,255,255,0.1)" stroke="#f07828" stroke-width="2.5"/><text x="200" y="31" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="24" fill="#f07828">7</text></svg>
    </div>
    
    <div class="header-right">
      <div class="user-pill">${icon.user} ${state.user}</div>
      <button class="btn-logout" id="logout-btn" title="Uitloggen">${icon.logout}</button>
    </div>
  </div>
  <main id="main-content"></main>
`;

  document.getElementById('logout-btn').addEventListener('click', () => {
    state.user = null; S.set('user', null); render();
  });
  app.querySelectorAll('[data-tab]').forEach(btn =>
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); })
  );

  const main = document.getElementById('main-content');
  if (state.tab === 'home') renderDashboard(main);
  else if (state.tab === 'taken') renderTaken(main);
  else if (state.tab === 'boodschappen') renderBoodschappen(main);
  else if (state.tab === 'aandachtspunten') renderAandachtspunten(main);

function showConfetti() {
  var cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(cv);
  var ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  var cols = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
  var pieces = [];
  for(var i=0;i<160;i++) pieces.push({ x:Math.random()*cv.width, y:Math.random()*cv.height-cv.height, w:Math.random()*10+5, h:Math.random()*6+3, color:cols[Math.floor(Math.random()*cols.length)], speed:Math.random()*4+2, angle:Math.random()*360, spin:Math.random()*10-5 });
  var fr;
  function draw(){ ctx.clearRect(0,0,cv.width,cv.height); var done=true; pieces.forEach(function(p){ if(p.y<cv.height+20) done=false; p.y+=p.speed; p.angle+=p.spin; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); }); if(done){if(cv.parentNode)cv.parentNode.removeChild(cv);return;} fr=requestAnimationFrame(draw); }
  draw();
  setTimeout(function(){ cancelAnimationFrame(fr); if(cv.parentNode) cv.parentNode.removeChild(cv); }, 4000);
}

function renderJaarplanningTabel(curWeek){
  var jaar=new Date().getFullYear();
  var weken=[];
  for(var i=0;i<=6;i++){var w=curWeek+i;if(w>52)w=w-52;weken.push(w);}
  var taakMap={},alle=[];
  weken.forEach(function(w){takenDezeWeek(w).forEach(function(t){if(!taakMap[t.id]){taakMap[t.id]=true;alle.push(t);}});});
  alle.sort(function(a,b){return a.id<b.id?-1:1;});
  var ths='<th style="padding:4px 7px;background:#f8fafc;border:1px solid #e2e8f0;font-size:11px;color:#64748b;text-align:left;position:sticky;left:0;z-index:2;white-space:nowrap">Taak</th>';
  weken.forEach(function(w){
    var isCur=w===curWeek;
    ths+='<th style="padding:4px 7px;background:'+(isCur?'#dbeafe':'#f8fafc')+';border:1px solid '+(isCur?'#93c5fd':'#e2e8f0')+';font-size:11px;font-weight:'+(isCur?'700':'500')+';color:'+(isCur?'#1d4ed8':'#64748b')+';text-align:center;white-space:nowrap">W'+w+'</th>';
  });
  var trs='';
  alle.forEach(function(t){
    var tds='<td style="padding:2px 7px;border:1px solid #e2e8f0;font-size:11px;color:#475569;background:#fafafa;position:sticky;left:0;z-index:1;white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis" title="'+esc(t.naam)+'">'+esc(t.naam)+'</td>';
    weken.forEach(function(w){
      var isCur=w===curWeek;
      var weekKey=jaar+'W'+w;
      var checks=state.planningChecks[weekKey]||[];
      var dezeWeek=takenDezeWeek(w);
      var dezeIds={};dezeWeek.forEach(function(x){dezeIds[x.id]=true;});
      if(dezeIds[t.id]){
        var chk=checks.indexOf(t.id)!==-1;
        var cellBg=chk?'#15803d':'#1d4ed8';
        var borderCol=isCur?'#93c5fd':'#1e40af';
        tds+='<td style="text-align:center;padding:3px;border:1px solid '+borderCol+';background:'+cellBg+'"><button class="jp-cb '+(chk?'jp-done':'')+'" data-jp="'+jaar+'|'+w+'|'+t.id+'" style="width:17px;height:17px;border-radius:50%;border:2px solid '+(chk?'#4ade80':'rgba(255,255,255,0.6)')+';background:'+(chk?'#16a34a':'transparent')+';cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff">'+(chk?'✓':'')+'</button></td>';
      } else {
        tds+='<td style="text-align:center;border:1px solid '+(isCur?'#93c5fd':'#e2e8f0')+';background:'+(isCur?'#eff6ff':'#f8fafc')+';color:#cbd5e1;font-size:11px">-</td>';
      }
    });
    trs+='<tr>'+tds+'</tr>';
  });
  return '<div style="padding-bottom:24px"><div class=\"section-hdr\" style=\"margin-bottom:14px\"><span class=\"section-ttl\"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Jaarplanning</span></div><div style="overflow-x:auto;border-radius:10px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06);display:block"><table style="border-collapse:collapse;font-size:11px"><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div></div>';
}

function fetchWeer() {
  var ico=document.getElementById('wc-ico');
  var temp=document.getElementById('wc-temp');
  var desc=document.getElementById('wc-desc');
  var wind=document.getElementById('wc-wind');
  var days=document.getElementById('wc-days');
  if(!ico) return;
  fetch('https://api.open-meteo.com/v1/forecast?latitude=51.6978&longitude=5.3037&current=temperature_2m,weathercode,windspeed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&wind_speed_unit=kmh&timezone=Europe/Amsterdam&forecast_days=5')
  .then(function(r){return r.json();})
  .then(function(d){
    var c=d.current;
    function wmo(code){
      if(code===0)return{e:'☀️',t:'Helder'};
      if(code<=2)return{e:'⛅',t:'Half bewolkt'};
      if(code<=3)return{e:'☁️',t:'Bewolkt'};
      if(code<=48)return{e:'🌫️',t:'Mist'};
      if(code<=55)return{e:'🌦️',t:'Motregen'};
      if(code<=65)return{e:'🌧️',t:'Regen'};
      if(code<=75)return{e:'🌨️',t:'Sneeuw'};
      if(code<=82)return{e:'🌧️',t:'Buien'};
      if(code<=99)return{e:'⚡',t:'Onweer'};
      return{e:'🌤️',t:''};
    }
    var today=wmo(c.weathercode);
    if(ico)ico.textContent=today.e;
    if(temp)temp.textContent=Math.round(c.temperature_2m)+'°C';
    if(desc)desc.textContent=today.t;
    if(wind)wind.textContent='💨 '+Math.round(c.windspeed_10m)+' km/u wind';
    var advies=document.getElementById('wc-advies');
    if(advies){var code=c.weathercode,tmp=Math.round(c.temperature_2m),drukte,kleur,bars;
      if(tmp>26&&code<=1){drukte='Onvoorspelbaar';kleur='#a78bfa';bars=3;}
      else if(tmp>26){drukte='Druk';kleur='#86efac';bars=4;}
      else if(code===0&&tmp>=18){drukte='Erg druk';kleur='#4ade80';bars=5;}
      else if(code<=2&&tmp>=15){drukte='Druk';kleur='#86efac';bars=4;}
      else if(code<=48&&tmp>=10){drukte='Normaal';kleur='#fbbf24';bars=3;}
      else if(code>=51&&code<=65){drukte='Rustig';kleur='#fb923c';bars=2;}
      else if(code>=80){drukte='Erg rustig';kleur='#f87171';bars=1;}
      else{drukte='Normaal';kleur='#fbbf24';bars=3;}
      var bHtml='';for(var bi=1;bi<=5;bi++)bHtml+='<div style="width:10px;height:'+(bi*5+8)+'px;border-radius:3px;background:'+(bi<=bars?kleur:'rgba(255,255,255,.2)')+'"><\/div>';
      advies.innerHTML='<div style="font-size:10px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Wasdruk<\/div><div style="display:flex;align-items:flex-end;gap:4px;margin-bottom:8px">'+bHtml+'<\/div><div style="font-size:14px;font-weight:700;color:'+kleur+'">'+drukte+'<\/div><div style="font-size:10px;opacity:.55;margin-top:2px">verwacht vandaag<\/div>';}
    if(days){
      var dn=['Zo','Ma','Di','Wo','Do','Vr','Za'];
      var htm='';
      d.daily.time.slice(1,5).forEach(function(date,i){
        var idx=i+1;
        var w=wmo(d.daily.weathercode[idx]);
        var rain=d.daily.precipitation_probability_max[idx];
        htm+='<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;text-align:center;min-width:72px">'
          +'<div style="font-size:11px;opacity:.65;font-weight:700;text-transform:uppercase">'+dn[new Date(date).getDay()]+'</div>'
          +'<div style="font-size:26px;margin:5px 0">'+w.e+'</div>'
          +'<div style="font-size:13px;font-weight:700">'+Math.round(d.daily.temperature_2m_max[idx])+'° <span style="opacity:.5">'+Math.round(d.daily.temperature_2m_min[idx])+'°</span></div>'
          +(rain>15?'<div style="font-size:10px;opacity:.65;margin-top:3px">💧'+rain+'%</div>':'')
          +'</div>';
      });
      days.innerHTML=htm;
    }
  }).catch(function(){if(desc)desc.textContent='Geen verbinding';});
}

          '<div class="item-body"><div class="item-title struck">' + esc(t.tekst) + '</div>' +
          '<div class="item-meta"><span class="meta-text">' + esc(displayNaam(t.door)) + '</span></div></div>' +
          '<button class="delete-btn" data-del="' + t.id + '">' + icon.trash + '</button></div>';
      }).join("") : "") : "") +
  '</div>';

  document.getElementById("taak-add-btn").addEventListener("click", function(){ state.takenForm = !state.takenForm; renderTaken(el); });
  if (state.takenForm) {
    document.getElementById("taak-tekst").addEventListener("input", function(e){ state.takenTekst = e.target.value; });
    document.getElementById("taak-cancel").addEventListener("click", function(){ state.takenForm = false; state.takenTekst = ""; renderTaken(el); });
    document.getElementById("taak-save").addEventListener("click", function(){
      if (!state.takenTekst.trim()) return;
      state.taken.unshift({ id: uid(), tekst: state.takenTekst.trim(), voor: "Beide", door: state.user, voltooid: false, aangemaakt: new Date().toISOString() });
      S.set("taken", state.taken);
      state.takenTekst = ""; state.takenForm = false;
      renderTaken(el); renderNav();
    });
  }
  var togKlaar = document.getElementById("toggle-klaar");
  if (togKlaar) togKlaar.addEventListener("click", function(){ state.takenToonKlaar = !state.takenToonKlaar; renderTaken(el); });
  var delKlaar = document.getElementById("del-klaar");
  if (delKlaar) delKlaar.addEventListener("click", function(){
    state.taken = state.taken.filter(function(t){ return !t.voltooid; });
    S.set("taken", state.taken); renderTaken(el); renderNav();
  });
  el.querySelectorAll("[data-toggle]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var t = state.taken.find(function(x){ return x.id === btn.dataset.toggle; });
      if (t) { if(!t.bezig&&!t.voltooid){t.bezig=true;t.voltooid=false;}else if(t.bezig&&!t.voltooid){t.bezig=false;t.voltooid=true;t.voltooid_op=new Date().toISOString();}else{t.bezig=false;t.voltooid=false;t.voltooid_op=null;} S.set("taken", state.taken); renderTaken(el); renderNav(); }
    });
  });
  el.querySelectorAll("[data-del]").forEach(function(btn){
    btn.addEventListener("click", function(){
      state.taken = state.taken.filter(function(x){ return x.id !== btn.dataset.del; });
      S.set("taken", state.taken); renderTaken(el); renderNav();
    });
  });
}

function renderBoodschappen(el) {
  const open = state.boodschappen.filter(b => !b.afgevinkt);
  const afgevinkt = state.boodschappen.filter(b => b.afgevinkt);

  el.innerHTML = `<div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">Boodschappen</div>
        <div class="page-subtitle">${open.length} open</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="form-row">
        <input id="boods-naam" class="input" placeholder="Product toevoegen..." value="${esc(state.boodschappenTekst)}" />
        <input id="boods-hoeveel" class="input" style="width:90px" placeholder="Hoeveel?" value="${esc(state.boodschappenHoeveel)}" />
      </div>
      <button class="btn-save orange" id="boods-save" style="width:100%;padding:10px;border-radius:10px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px">${icon.plus} Toevoegen</button>
    </div>

    ${open.length === 0 && afgevinkt.length === 0 ? `
    <div class="empty-state"><p>Boodschappenlijst is leeg.</p><small>Voeg hierboven een product toe.</small></div>
    ` : `
    ${open.map(b => `
    <div class="item-row">
      <button class="check-btn" data-toggle="${b.id}" style="border-color:#fed7aa" onmouseover="this.style.borderColor='#f97316'" onmouseout="this.style.borderColor='#fed7aa'"></button>
      <div class="item-body">
        <span class="item-title">${esc(b.naam)}</span>
        ${b.hoeveel ? `<span class="tag orange" style="margin-left:8px">${esc(b.hoeveel)}</span>` : ''}
        <div class="item-meta"><span class="meta-text">${esc(displayNaam(b.door))}</span></div>
      </div>
      <button class="delete-btn" data-del="${b.id}">${icon.trash}</button>
    </div>`).join('')}

    ${afgevinkt.length > 0 ? `
    <div class="collapse-actions">
      <button class="collapse-btn" id="toggle-afgevinkt">
        ${state.boodschappenToonAfgevinkt ? 'ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ²' : 'ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¶'} Afgevinkt (${afgevinkt.length})
      </button>
      <button class="del-done-btn" id="del-afgevinkt">Verwijder afgevinkt</button>
    </div>
    ${state.boodschappenToonAfgevinkt ? afgevinkt.map(b => `
    <div class="item-row dimmed">
      <button class="check-btn done" data-toggle="${b.id}">${icon.check}</button>
      <div class="item-body">
        <span class="item-title struck">${esc(b.naam)}${b.hoeveel ? ' ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ '+esc(b.hoeveel) : ''}</span>
      </div>
      <button class="delete-btn" data-del="${b.id}">${icon.trash}</button>
    </div>`).join('') : ''}
    ` : ''}
    `}
  </div>`;

  document.getElementById('boods-naam').addEventListener('input', e => state.boodschappenTekst = e.target.value);
  document.getElementById('boods-hoeveel').addEventListener('input', e => state.boodschappenHoeveel = e.target.value);
  const saveBoods = () => {
    if (!state.boodschappenTekst.trim()) return;
    state.boodschappen.unshift({ id: uid(), naam: state.boodschappenTekst.trim(), hoeveel: state.boodschappenHoeveel.trim(), afgevinkt: false, door: state.user, aangemaakt: new Date().toISOString() });
    S.set('boodschappen', state.boodschappen);
    state.boodschappenTekst = ''; state.boodschappenHoeveel = '';
    renderBoodschappen(el); renderNav();
  };
  document.getElementById('boods-save').addEventListener('click', saveBoods);
  document.getElementById('boods-naam').addEventListener('keydown', e => e.key === 'Enter' && saveBoods());

  const togBtn = document.getElementById('toggle-afgevinkt');
  if (togBtn) togBtn.addEventListener('click', () => { state.boodschappenToonAfgevinkt = !state.boodschappenToonAfgevinkt; renderBoodschappen(el); });

function renderAandachtspunten(el) {
  const open = state.aandachtspunten.filter(a => !a.afgevinkt);
  const afgevinkt = state.aandachtspunten.filter(a => a.afgevinkt);

  el.innerHTML = `<div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">Aandachtspunten</div>
        <div class="page-subtitle">Aankomende periode</div>
      </div>
      <button class="fab purple" id="aand-add-btn">${icon.plus}</button>
    </div>

    ${state.aandachtForm ? `
    <div class="form-card" style="border-color:#f3e8ff">
      <div class="form-label">Nieuw aandachtspunt</div>
      <input id="aand-titel" class="input" placeholder="Aandachtspunt..." value="${esc(state.aandachtTekst)}" style="margin-bottom:8px"/>
      <textarea id="aand-beschrijving" class="input" rows="2" placeholder="Extra toelichting (optioneel)...">${esc(state.aandachtBeschrijving)}</textarea>
      <div class="form-actions">
        <button class="btn-cancel" id="aand-cancel">Annuleer</button>
        <button class="btn-save purple" id="aand-save">Toevoegen</button>
      </div>
    </div>` : ''}

    ${open.length === 0 && afgevinkt.length === 0 ? `
    <div class="empty-state"><p>Geen aandachtspunten.</p><small>Klik op + om toe te voegen.</small></div>
    ` : `
    ${open.map(a => `
    <div class="item-row">
      <button class="check-btn purple-ring" data-toggle="${a.id}"></button>
      <div class="item-body">
        <div class="item-title" style="font-weight:600">${esc(a.titel)}</div>
        ${a.beschrijving ? `<div class="meta-text" style="margin-top:3px;line-height:1.4">${esc(a.beschrijving)}</div>` : ''}
        <div class="item-meta">
          <span class="tag purple">${esc(displayNaam(a.door))}</span>
          <span class="meta-text">${fmtDate(a.aangemaakt)}</span>
        </div>
      </div>
      <button class="delete-btn" data-del="${a.id}">${icon.trash}</button>
    </div>`).join('')}

    ${afgevinkt.length > 0 ? `
    <div class="collapse-actions">
      <button class="collapse-btn" id="toggle-afgehandeld">
        ${state.aandachtToonAfgevinkt ? 'ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ²' : 'ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¶'} Afgehandeld (${afgevinkt.length})
      </button>
    </div>
    ${state.aandachtToonAfgevinkt ? afgevinkt.map(a => `
    <div class="item-row dimmed">
      <button class="check-btn done" data-toggle="${a.id}">${icon.check}</button>
      <div class="item-body"><div class="item-title struck">${esc(a.titel)}</div></div>
      <button class="delete-btn" data-del="${a.id}">${icon.trash}</button>
    </div>`).join('') : ''}
    ` : ''}
    `}
  </div>`;

  document.getElementById('aand-add-btn').addEventListener('click', () => {
    state.aandachtForm = !state.aandachtForm; renderAandachtspunten(el);
  });
  if (state.aandachtForm) {
    document.getElementById('aand-titel').addEventListener('input', e => state.aandachtTekst = e.target.value);
    document.getElementById('aand-beschrijving').addEventListener('input', e => state.aandachtBeschrijving = e.target.value);
    document.getElementById('aand-cancel').addEventListener('click', () => {
      state.aandachtForm = false; state.aandachtTekst = ''; state.aandachtBeschrijving = ''; renderAandachtspunten(el);
    });
    document.getElementById('aand-save').addEventListener('click', () => {
      if (!state.aandachtTekst.trim()) return;
      state.aandachtspunten.unshift({ id: uid(), titel: state.aandachtTekst.trim(), beschrijving: state.aandachtBeschrijving.trim(), afgevinkt: false, door: state.user, aangemaakt: new Date().toISOString() });
      S.set('aandachtspunten', state.aandachtspunten);
      state.aandachtTekst = ''; state.aandachtBeschrijving = ''; state.aandachtForm = false;
      renderAandachtspunten(el); renderNav();
    });
  }
  const togAfg = document.getElementById('toggle-afgehandeld');
  if (togAfg) togAfg.addEventListener('click', () => { state.aandachtToonAfgevinkt = !state.aandachtToonAfgevinkt; renderAandachtspunten(el); });
  el.querySelectorAll('[data-toggle]').forEach(btn =>
    btn.addEventListener('click', () => {
      const a = state.aandachtspunten.find(x => x.id === btn.dataset.toggle);
      if (a) { a.afgevinkt = !a.afgevinkt; S.set('aandachtspunten', state.aandachtspunten); renderAandachtspunten(el); renderNav(); }
    })
  );
  el.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', () => {
      state.aandachtspunten = state.aandachtspunten.filter(x => x.id !== btn.dataset.del);
      S.set('aandachtspunten', state.aandachtspunten); renderAandachtspunten(el); renderNav();
    })

function renderNav() {
  const navEl = document.querySelector('.nav-inner');
  if (!navEl) return;
  const openTaken = state.taken.filter(t => !t.voltooid).length;
  const openBoodschappen = state.boodschappen.filter(b => !b.afgevinkt).length;
  const openAandachtspunten = state.aandachtspunten.filter(a => !a.afgevinkt).length;
  const badge = (btn, n) => {
    let b = btn.querySelector('.nav-badge');
    if (n > 0) {
      if (!b) { b = document.createElement('span'); b.className='nav-badge'; btn.prepend(b); }
      b.textContent = n > 9 ? '9+' : n;
    } else if (b) b.remove();
  };
  const btns = navEl.querySelectorAll('[data-tab]');
  btns.forEach(btn => {
    if (btn.dataset.tab === 'taken') badge(btn, openTaken);
    else if (btn.dataset.tab === 'boodschappen') badge(btn, openBoodschappen);
    else if (btn.dataset.tab === 'aandachtspunten') badge(btn, openAandachtspunten);

  try {
    await fetch(SBURL + "/rest/v1/" + tabel, {

function renderBerichten(el) {
  if (window._chatTimer) clearInterval(window._chatTimer);
  function teken() {
    el.innerHTML = '<div class="page" style="padding-bottom:0">' +
      '<div class="page-header"><div class="page-title">Chat</div>' +
      '<button id="chat-ververs" style="background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px">' + icon.refresh + '</button></div>' +
      '<div class="chat-feed" id="chat-feed">' +
      (state.berichten.length===0 ? '<div class="empty-state"><p>Nog geen berichten.</p><small>Stuur het eerste bericht!</small></div>' :
        state.berichten.map(function(b){
          var mine = b.door===state.user;
          return '<div class="' + (mine?"chat-mine":"chat-other") + '">' +
            '<div class="chat-sender">' + esc(displayNaam(b.door)) + '</div>' +
            '<div class="chat-bubble">' + esc(b.tekst) + '</div>' +
            '<div class="chat-ts">' + fmtDate(b.aangemaakt) + '</div></div>';
        }).join("")) +
      '</div></div>' +
      '<div class="chat-bar"><div class="chat-bar-inner">' +
      '<input id="chat-inp" class="input" placeholder="Typ een bericht..." value="' + esc(state.berichtTekst) + '"/>' +
      '<button class="chat-send-btn" id="chat-zend">Stuur</button></div></div>';
    setTimeout(function(){ var f=document.getElementById("chat-feed"); if(f) f.scrollTop=f.scrollHeight; },30);
    document.getElementById("chat-inp").addEventListener("input", function(e){ state.berichtTekst=e.target.value; });
    var stuur = function(){
      var tekst = state.berichtTekst.trim(); if (!tekst) return;
      var msg = {id:uid(), tekst:tekst, door:state.user, aangemaakt:new Date().toISOString()};
      state.berichten.push(msg); state.berichtTekst=""; teken();
      sbInsert("berichten", msg);
    };
    document.getElementById("chat-zend").addEventListener("click", stuur);
    document.getElementById("chat-inp").addEventListener("keydown", function(e){ if(e.key==="Enter") stuur(); });
    document.getElementById("chat-ververs").addEventListener("click", function(){
      sbLoad("berichten").then(function(d){ if(d){state.berichten=d; teken();} });
    });
  }
  sbLoad("berichten").then(function(d){ if(d){state.berichten=d; teken();} });
  teken();
  window._chatTimer = setInterval(function(){
    if(state.tab==="berichten") sbLoad("berichten").then(function(d){ if(d&&d.length!==state.berichten.length){state.berichten=d; teken();} });
  }, 20000);
